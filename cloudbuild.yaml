steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/atcoder-similarity-search/api:$SHORT_SHA"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/atcoder-similarity-search/api:latest"
      - "-f"
      - "backend/Dockerfile"
      - "backend"

  # Push the container image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/atcoder-similarity-search/api"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "atcoder-similarity-search-api"
      - "--image"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/atcoder-similarity-search/api:$SHORT_SHA"
      - "--region"
      - "asia-northeast1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--set-secrets"
      - "GEMINI_API_KEY=gemini-api-key:latest,QDRANT_API_KEY=qdrant-api-key:latest"
      - "--set-env-vars"
      - "QDRANT_URL=https://7edf97f9-a920-4347-8c83-aa69ff3d53d4.us-east4-0.gcp.cloud.qdrant.io:6334,RUST_LOG=info"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "10"

options:
  logging: CLOUD_LOGGING_ONLY
